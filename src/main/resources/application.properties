spring.application.name=spring-boot

# 自動テーブル生成
spring.jpa.hibernate.ddl-auto=create-drop

# H2データベースの接続設定
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.security.user.name=admin
spring.security.user.password=1234

# H2コンソール
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# Hibernate自体のログは完全にオフ
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 💡 バッチサイズの設定
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true

# 1. 起動時のあの巨大な「Spring」の文字（バナー）を消す
spring.main.banner-mode=off

# 2. Springの内部ログ（Tomcatやフレームワークの動き）を「WARN（警告）」以上にする
# これで、正常に動いているときの雑多な「INFO」ログは一切出なくなります
logging.level.root=WARN

# 3. 自分が作ったアプリのログ（例：com.example）だけは「INFO」でちゃんと出す
logging.level.com.example=INFO


# =================================================================
# 🛡️ 修正版：ログのレベル制御だけで100万件を無音にする設定
# =================================================================

# ⭕ 1. プロキシのログ出力を「WARN（警告）」以上にする
# これにより、通常の100万件の「INFO」ログはすべて画面上から消え去り、無音になります。
logging.level.com.github.gavlyukovskiy.boot.jdbc.decorating=WARN
logging.level.p6spy=WARN

# 2. P6Spyの標準ログフォーマットは一番シンプルなやつにしておく
decorator.datasource.p6spy.logging=sysout

